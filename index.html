<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Jumping Bros</title>
    <link rel="icon" type="image/x-icon" href="./src/images/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="./src/images/favicon-32x32.png">
    <link rel="stylesheet" href="./src/style/global.css">
    <link rel="stylesheet" href="./src/style/player.css">
    <link rel="stylesheet" href="./src/style/obstacles.css">
    <script type="module" src="./src/script.js" defer></script>
</head>
<body>
    <main class="main">
        <section class="game debug-hitboxes" aria-labelledby="game-title">
            <section class="main-menu" aria-labelledby="game-title">
                <h1 id="game-title">Super Jumping Bros</h1>
                <p>Controls: A / D to move, Space to jump, P or Esc to pause</p>
                <label class="volume-control">
                    <span>Volume</span>
                    <input class="volume-slider" type="range" min="0" max="100" value="60" aria-label="Game volume">
                </label>
                <div class="actions-container">
                    <button class="action-btn" data-action="start" type="button">Start</button>
                    <button class="action-btn" data-action="exit" type="button">Exit</button>
                </div>
            </section>

            <section class="pause-menu hide-pause-menu" aria-labelledby="pause-title">
                <h2 id="pause-title">Paused</h2>
                <p>Press P or Esc to resume</p>
                <label class="volume-control">
                    <span>Volume</span>
                    <input class="volume-slider" type="range" min="0" max="100" value="60" aria-label="Game volume">
                </label>
                <div class="actions-container">
                    <button class="action-btn" data-action="resume" type="button">Resume</button>
                    <button class="action-btn action-btn--secondary" data-action="main-menu" type="button">Main Menu</button>
                </div>
            </section>

            <section class="game-over-menu hide-game-over-menu" aria-labelledby="game-over-title">
                <h2 id="game-over-title">Game Over</h2>
                <p>You ran out of health.</p>
                <p class="final-score">Final score: 0</p>
                <label class="volume-control">
                    <span>Volume</span>
                    <input class="volume-slider" type="range" min="0" max="100" value="60" aria-label="Game volume">
                </label>
                <div class="actions-container">
                    <button class="action-btn" data-action="retry" type="button">Retry</button>
                    <button class="action-btn action-btn--secondary" data-action="main-menu" type="button">Main Menu</button>
                </div>
            </section>

            <div class="game-layer game-layer--sky" aria-hidden="true"></div>
            <div class="game-layer game-layer--background" aria-hidden="true"></div>

            <div class="game-layer game-layer--main">
                <div class="hud">
                    <span id="score-display">Score 00</span>

                     <div class="health-status">
                        <span class="health-status__label">HP</span>
                        <div
                         class="health-bar"
                          role="meter" aria-label="Player health"
                           aria-valuemin="0"
                            aria-valuemax="100"
                             aria-valuenow="100"
                             >
                            <div class="health-bar__fill"></div>
                        </div>
                        <span class="health-status__value">100%</span>
                    </div>

                    <label class="hud-volume">
                        <span>Vol</span>
                        <input class="volume-slider" type="range" min="0" max="100" value="60" aria-label="Game volume">
                    </label>
                </div>


                <div class="player" id="player" aria-hidden="true">
                    <div class="head"></div>
                    <div class="body"></div>
                    <div class="arm left"></div>
                    <div class="arm right"></div>
                    <div class="leg left"></div>
                    <div class="leg right"></div>
                </div>
                <div class="obstacles"></div>

                <div class="ground" aria-hidden="true"></div>
            </div>
        </section>
    </main>
</body>
</html>
